name: Lint and Format

on:
  push:
  pull_request:

jobs:
  clang:
    name: Clang-Tidy and Clang-Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-tidy and clang-format (21+)
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y wget lsb-release gnupg g++
          # Add official LLVM APT repository for Ubuntu 24.04 (noble)
          echo "deb [signed-by=/usr/share/keyrings/apt.llvm.org.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/apt.llvm.org.gpg
          sudo apt-get update
          # Install specific LLVM 21 tools
          sudo apt-get install -y clang-tidy-21 clang-format-21
          # Make them the default clang-tidy/clang-format on PATH
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-21 100
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-21 100

      - name: Setup CMake 3.30.x
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.30.x'

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('conanfile.*') }}
          restore-keys: |
            conan2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('conanfile.*') }}

      - name: Install Conan and prepare dependencies (Release)
        timeout-minutes: 10
        run: |
          python -m pip install --upgrade conan
          conan --version
          conan profile detect --force

          conan remote add conancenter https://center.conan.io || true
          conan remote enable conancenter || true

          if [ "${{ matrix.os }}" = "windows" ]; then
            if [ "${{ matrix.cmake_arch }}" = "Win32" ]; then
              ARCH_ARG="-s arch=x86"
            else
              ARCH_ARG="-s arch=x86_64"
            fi
            COMPILER_ARGS=""  # MSVC binaries are broadly available
          elif [ "${{ matrix.os }}" = "linux" ]; then
            ARCH_ARG=""
            COMPILER_ARGS="-s compiler=gcc -s compiler.version=13 -s compiler.cppstd=20"
          elif [ "${{ matrix.os }}" = "macos" ]; then
            ARCH_ARG="-s arch=armv8 -s os=Macos"
            COMPILER_ARGS="-s compiler=apple-clang -s compiler.version=15 -s compiler.libcxx=libc++ -s compiler.cppstd=20"
          fi

          conan install . -s build_type=Release ${ARCH_ARG} ${COMPILER_ARGS} \
            -b missing \
            -g CMakeDeps -g CMakeToolchain
        shell: bash

      - name: Configure (Release)
        timeout-minutes: 10
        run: |
          cmake --preset conan-release
        shell: bash

      - name: Check formatting via CMake target
        timeout-minutes: 10
        run: cmake --build --preset conan-release --target clang-format_all

      - name: Run clang-tidy via CMake target
        timeout-minutes: 10
        run: cmake --build --preset conan-release --target clang-tidy_all
