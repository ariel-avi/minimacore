name: Code Coverage

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov gcc g++ python3-pip

      - name: Setup CMake 3.30.x
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.30.x'

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('conanfile.*') }}
          restore-keys: |
            conan2-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Conan and prepare dependencies
        run: |
          python -m pip install --upgrade conan
          conan profile detect --force
          conan remote add conancenter https://center.conan.io || true
          conan remote enable conancenter || true
          conan install . \
            -s build_type=Debug \
            -s compiler=gcc \
            -s compiler.cppstd=20 \
            --build=missing \
            -g CMakeDeps -g CMakeToolchain

      - name: Configure
        run: |
          cmake --preset conan-debug -DCMAKE_BUILD_TYPE=Coverage 

      - name: Build tests
        run: cmake --build --preset conan-debug --target minimacore_tests -j$(nproc)

      - name: Capture baseline coverage
        run: |
          lcov --capture --initial --no-external \
            --directory build/Debug \
            --output-file coverage_baseline.info \
            --exclude '*/tests/src/*'

      - name: Run tests
        run: ctest --test-dir build/Debug --output-on-failure

      - name: Capture post-test coverage
        run: |
          lcov --capture --no-external \
            --directory build/Debug \
            --output-file coverage_total.info \
            --exclude '*/tests/src/*'

      - name: Merge coverage data
        run: lcov -a coverage_baseline.info -a coverage_total.info -o coverage.info

      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage_reports
          path: coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: true
